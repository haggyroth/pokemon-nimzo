name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch to save CI minutes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Python: lint (ruff) + tests (pytest)  — run in parallel
  # -----------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Run ruff via uvx (no venv needed)
        run: uvx ruff@0.11.13 check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
          python-version: "3.12"

      - name: Create venv and install project + dev deps
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run mypy --strict
        run: uv run mypy src/ --strict

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
          python-version: "3.12"

      - name: Create venv and install project + dev deps
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run pytest with coverage
        run: uv run pytest --tb=short --cov=src/nidozo --cov-fail-under=65

  # -----------------------------------------------------------------------
  # Frontend: build check
  # -----------------------------------------------------------------------
  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
